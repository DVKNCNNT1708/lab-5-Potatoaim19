services:
  # Camera Stream API (Team A2 - Consumer)
  api:
    build: .
    image: v1.0.0-team-camera
    container_name: camera-stream-api
    environment:
      - SERVICE_NAME=camera-stream-service
      - SERVICE_VERSION=1.0.0
      - AUTH_TOKEN=lab-token
      - AI_SERVICE_URL=http://ai-service:9000
      - APP_PORT=8000
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Database cho Camera Detections
  db:
    image: postgres:15-alpine
    container_name: camera-db
    environment:
      POSTGRES_USER: lab05
      POSTGRES_PASSWORD: lab05pass
      POSTGRES_DB: cameradb
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab05"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Vision Provider (Team A2 - Provider)
  ai-service:
    build: .
    image: v1.0.0-team-camera
    container_name: ai-vision-provider
    environment:
      - WEBHOOK_URL=http://api:8000/webhook/detection-completed
    # Chạy AI service trên port 9000 sử dụng mã nguồn trong src/ai_service
    command: ["uvicorn", "ai_service.main:app", "--app-dir", "src", "--host", "0.0.0.0", "--port", "9000"]
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data:
